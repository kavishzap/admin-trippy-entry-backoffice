# Next.js on Netlify: use the official runtime plugin.
# In the Netlify UI, clear a custom "Publish directory" (do not set it to "/.next").
# Required env vars: NEXT_PUBLIC_SUPABASE_URL, NEXT_PUBLIC_SUPABASE_ANON_KEY

[build]
  command = "pnpm run build"

[[plugins]]
  package = "@netlify/plugin-nextjs"
